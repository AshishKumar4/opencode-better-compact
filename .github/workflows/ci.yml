name: CI

on:
    push:
        branches: [master]
    pull_request:

jobs:
    verify:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
            - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
              with:
                  version: 10.13.1
            - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
              with:
                  node-version: 24
                  cache: pnpm
            - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
              with:
                  bun-version: 1.3.14
            - run: pnpm install --frozen-lockfile
            - run: pnpm run typecheck
            - run: pnpm test
            - run: pnpm run test:tui
            - run: pnpm run build
            - run: pnpm run verify:package

    compatibility:
        needs: verify
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                opencode: ["1.17.13", "latest"]
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
            - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
              with:
                  version: 10.13.1
            - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
              with:
                  node-version: 24
                  cache: pnpm
            - run: pnpm install --frozen-lockfile
            - run: pnpm run build
            - name: Install minimum OpenCode
              if: matrix.opencode != 'latest'
              run: curl -fsSL https://opencode.ai/install | bash -s -- --version "${{ matrix.opencode }}" --no-modify-path
            - name: Install latest OpenCode
              if: matrix.opencode == 'latest'
              run: curl -fsSL https://opencode.ai/install | bash -s -- --no-modify-path
            - run: pnpm run smoke:install -- "$HOME/.opencode/bin/opencode"
