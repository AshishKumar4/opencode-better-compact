name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm test
      - run: pnpm run build
      - run: pnpm run verify:package
      - run: pnpm run package:release
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            packages/opencode/.release/better-compact.tar.gz
            packages/opencode/.release/checksums.txt
            packages/opencode/scripts/install.sh
          generate_release_notes: true
