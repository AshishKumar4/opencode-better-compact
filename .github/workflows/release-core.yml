name: Release Core

on:
    push:
        tags:
            - "core-v*"

permissions:
    contents: read

concurrency:
    group: release-core-${{ github.ref }}
    cancel-in-progress: false

jobs:
    publish:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        steps:
            - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
            - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
              with:
                  version: 10.13.1
            - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
              with:
                  node-version: 24
                  cache: pnpm
                  registry-url: https://registry.npmjs.org
            - run: pnpm install --frozen-lockfile
            - name: Verify tag matches core version
              run: |
                  expected="core-v$(node -p 'require("./packages/core/package.json").version')"
                  test "$GITHUB_REF_NAME" = "$expected" || { echo "tag $GITHUB_REF_NAME does not match $expected"; exit 1; }
            - run: pnpm run typecheck
            - run: pnpm test
            - run: pnpm --filter @better-compact/core run build
            # pnpm pack applies publishConfig (exports/main/types -> dist); npm then
            # uploads that tarball as-is, so the published manifest is correct.
            - name: Pack
              run: |
                  archive="$(cd packages/core && pnpm pack --pack-destination "$RUNNER_TEMP" | tail -1)"
                  mv "$archive" "$RUNNER_TEMP/core.tgz"
            - run: npm publish "$RUNNER_TEMP/core.tgz" --access public --provenance
